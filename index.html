<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BluePlayer</title>

    <link rel="stylesheet" href="src/css/style.css" />

    <link rel="manifest" href="manifest.json" />

    <link rel="icon" href="icon-192.png" />

    <meta name="theme-color" content="#0b0f1a" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="logo">BluePlayer</h1>

        <button id="upload-btn">Adicionar músicas</button>

        <input type="file" id="file-input" multiple accept="audio/*" hidden />

        <ul id="playlist"></ul>
      </aside>

      <main class="player">
        <canvas id="visualizer"></canvas>

        <h2 id="track-title">Selecione uma música</h2>

        <div class="controls">
          <button id="prev">⏮</button>
          <button id="play">▶</button>
          <button id="next">⏭</button>
        </div>

        <input type="range" id="progress" value="0" />
      </main>
    </div>

    <footer class="footer">
      <div class="volume-area">
        <label>Volume</label>

        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
      </div>

      <div class="eq">
        <div class="eq-band">
          <label>Grave</label>
          <input type="range" id="bass" min="-10" max="10" value="0" />
        </div>

        <div class="eq-band">
          <label>Médio</label>
          <input type="range" id="mid" min="-10" max="10" value="0" />
        </div>

        <div class="eq-band">
          <label>Agudo</label>
          <input type="range" id="treble" min="-10" max="10" value="0" />
        </div>
      </div>

      <button id="fullscreen">⛶</button>
    </footer>

    <script src="src/js/player.js"></script>
    <script src="src/js/playlist.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/visualizer.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
