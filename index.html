<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BluePlayer</title>

    <link rel="stylesheet" href="src/css/desktop.css" />
    <link rel="stylesheet" href="src/css/mobile.css" />

    <link rel="manifest" href="manifest.json" />

    <link rel="icon" href="icon-192.png" />

    <meta name="theme-color" content="#0b0f1a" />
  </head>

  <body>
    <div class="layout">
      <!-- PLAYER -->

      <main class="player">
        <canvas id="music-bars"></canvas>

        <div class="equalizer-container">
          <div class="eq-header">
            <label>Preset:</label>

            <select id="preset">
              <option value="flat">Flat</option>
              <option value="pop">Pop</option>
              <option value="rock">Rock</option>
              <option value="dance">Dance</option>
            </select>
          </div>

          <div class="eq-bands">
            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>60Hz</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>120Hz</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>250Hz</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>500Hz</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>1k</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>2k</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>4k</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>8k</span>
            </div>

            <div class="eq-band">
              <input type="range" min="-10" max="10" value="0" />
              <span>16k</span>
            </div>
          </div>
        </div>

        <h2 id="track-title">Selecione uma música</h2>

        <input type="range" id="progress" value="0" />

        <div class="controls">
          <button id="prev">⏮</button>
          <button id="play">▶</button>
          <button id="next">⏭</button>
        </div>
      </main>

      <!-- PLAYLIST -->

      <aside class="sidebar">
        <div class="drag-bar"></div>

        <div class="sidebar-header">
          <h1 class="logo">BluePlayer</h1>

          <label for="file-input" id="upload-btn"> Adicionar músicas </label>

          <input type="file" id="file-input" multiple accept="audio/*" hidden />
        </div>

        <ul id="playlist"></ul>
      </aside>
    </div>

    <footer class="footer">
      <div class="volume-area">
        <label>Volume</label>

        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
      </div>

      <button id="fullscreen">⛶</button>
    </footer>

    <script src="src/js/player.js"></script>
    <script src="src/js/ui.js"></script>
    <script src="src/js/visualizer.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
